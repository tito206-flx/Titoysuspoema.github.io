<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Página de Enlaces</title>
    <style>
        /* Reset básico - elimina márgenes por defecto */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Estilo del cuerpo de la página */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
        }

        /* Contenedor principal */
        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* Foto de perfil circular */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid #fff;
            margin-bottom: 15px;
            object-fit: cover;
        }

        /* Título - tu nombre */
        h1 {
            color: #ffffff;
            font-size: 1.6rem;
            margin-bottom: 5px;
        }

        /* Biografía debajo del nombre */
        .bio {
            color: #b8b8d4;
            font-size: 0.95rem;
            margin-bottom: 30px;
            line-height: 1.4;
        }

        /* Botones de enlaces */
        .link-button {
            display: block;
            width: 100%;
            padding: 16px 20px;
            margin-bottom: 14px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        /* Efecto al pasar el mouse sobre los botones */
        .link-button:hover {
            background: rgba(255, 255, 255, 0.25);
            border-color: rgba(255, 255, 255, 0.5);
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        /* Emojis dentro de los botones */
        .link-button .emoji {
            margin-right: 8px;
        }

        /* Pie de página */
        .footer {
            margin-top: 40px;
            color: #6b6b8d;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="container">

        <!-- TU FOTO DE PERFIL (cambia el link de la imagen) -->
        <img src="https://via.placeholder.com/120" alt="Mi foto" class="profile-img">

        <!-- TU NOMBRE -->
        <h1>Tu Nombre Aquí</h1>

        <!-- TU BIOGRAFÍA -->
        <p class="bio">📱 Te ayudo a encontrar los mejores productos y ofertas. ¡Haz clic en los enlaces! 👇</p>

        <!-- ============================================ -->
        <!-- TUS ENLACES (copia y pega más bloques como este) -->
        <!-- ============================================ -->

        <a href="https://www.amazon.com" class="link-button" target="_blank">
            <span class="emoji">🎧</span> Los mejores audífonos calidad-precio
        </a>

        <a href="https://www.hotmart.com" class="link-button" target="_blank">
            <span class="emoji">📚</span> Curso que me cambió la vida
        </a>

        <a href="https://www.youtube.com" class="link-button" target="_blank">
            <span class="emoji">▶️</span> Mi canal de YouTube
        </a>

        <a href="https://www.instagram.com" class="link-button" target="_blank">
            <span class="emoji">📸</span> Sígueme en Instagram
        </a>

        <a href="https://www.tiktok.com" class="link-button" target="_blank">
            <span class="emoji">🎵</span> Mi TikTok
        </a>

        <!-- FIN DE ENLACES -->

        <p class="footer">© 2026 - Hecho por mí 🚀</p>

    </div>
</body>
  </html>
